# docker-compose.yml — UrbanStream

networks:
  urbanstream:
    driver: bridge

volumes:
  minio_data:
  redis_data:
  spark_logs:

services:

  # ─────────────────────────────────────────────
  # Redpanda (Kafka-compatible broker)
  # ─────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v23.3.11
    container_name: urbanstream-redpanda
    networks: [urbanstream]
    ports:
      - "9092:9092"
      - "9644:9644"
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --set redpanda.auto_create_topics_enabled=true
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy.*true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 45s

  redpanda-console:
    image: redpandadata/console:v2.4.3
    container_name: urbanstream-console
    networks: [urbanstream]
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  redpanda-init:
    image: redpandadata/redpanda:v23.3.11
    container_name: urbanstream-redpanda-init
    networks: [urbanstream]
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Creating Kafka topics...' &&
      rpk topic create traffic_stream   --brokers redpanda:9092 --partitions 3 --replicas 1 || true &&
      rpk topic create pollution_stream --brokers redpanda:9092 --partitions 3 --replicas 1 || true &&
      rpk topic create weather_stream   --brokers redpanda:9092 --partitions 3 --replicas 1 || true &&
      rpk topic create worker_stream    --brokers redpanda:9092 --partitions 3 --replicas 1 || true &&
      echo 'All topics created!'
      "
    restart: on-failure

  # ─────────────────────────────────────────────
  # Apache Spark  (official Apache image)
  # Spark Master UI  ->  http://localhost:8888
  # ─────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: urbanstream-spark-master
    networks: [urbanstream]
    user: root
    ports:
      - "7077:7077"
      - "8888:8080"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_MASTER_HOST=0.0.0.0
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - REDIS_HOST=redis
      - KAFKA_BROKER=redpanda:9092
    entrypoint: ["/opt/spark/sbin/start-master.sh"]
    command: []
    volumes:
      - ./spark:/opt/spark/jobs
      - spark_logs:/opt/spark/logs
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  spark-worker:
    image: apache/spark:3.5.3
    container_name: urbanstream-spark-worker
    networks: [urbanstream]
    user: root
    ports:
      - "8081:8081"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - REDIS_HOST=redis
      - KAFKA_BROKER=redpanda:9092
      - SPARK_MASTER_URL=spark://spark-master:7077
    entrypoint: ["/opt/spark/sbin/start-worker.sh"]
    command: ["spark://spark-master:7077"]
    volumes:
      - ./spark:/opt/spark/jobs
      - spark_logs:/opt/spark/logs
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081 > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # MinIO  (S3-compatible storage)
  # Console  ->  http://localhost:9001  minioadmin / minioadmin
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: urbanstream-minio
    networks: [urbanstream]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    container_name: urbanstream-minio-init
    networks: [urbanstream]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/datalake    --ignore-existing &&
      mc mb local/checkpoints --ignore-existing &&
      echo 'MinIO buckets ready!'
      "
    restart: on-failure

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: urbanstream-redis
    networks: [urbanstream]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
